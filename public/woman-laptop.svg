  <!-- Left eye -->
  <circle cx="183" cy="120" r="6" fill="#2A1810"/>
  <circle cx="185" cy="118" r="2" fill="white"/>
  <!-- Right eye -->
  <circle cx="222" cy="120" r="6" fill="#2A1810"/>
  <circle cx="224" cy="118" r="2" fill="white"/>

  <!-- Nose -->
  <circle cx="202" cy="132" r="3.5" fill="#8A5530"/>

  <!-- Smile (purple-ish pink) -->
