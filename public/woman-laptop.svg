  <!-- Left ear cup -->
  <rect x="126" y="100" width="30" height="38" rx="10" fill="#F5C43E" stroke="#1a1a1a" stroke-width="3"/>
  <!-- Left cup inner detail -->
  <rect x="133" y="107" width="16" height="24" rx="5" fill="#D4A020" stroke="none"/>
  <!-- Right ear cup -->
  <rect x="266" y="100" width="30" height="38" rx="10" fill="#F5C43E" stroke="#1a1a1a" stroke-width="3"/>
  <!-- Right cup inner detail -->
  <rect x="273" y="107" width="16" height="24" rx="5" fill="#D4A020" stroke="none"/>

  <!-- ===== FACE DETAILS ===== -->
  <!-- Left eyebrow (purple) -->
