  <!-- Cheek blush hint -->
  <ellipse cx="172" cy="135" rx="10" ry="6" fill="#C07060" opacity="0.3"/>
  <ellipse cx="232" cy="135" rx="10" ry="6" fill="#C07060" opacity="0.3"/>

</svg>
